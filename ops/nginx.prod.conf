# Production nginx TLS reverse proxy (adjust server_name, certificates, and upstream addresses to your deployment topology).
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    map $http_x_forwarded_proto $proxy_scheme {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    upstream backend_api {
        server backend:4000;
    }

    upstream frontend_assets {
        server frontend:80;
    }

    server {
        listen 80;
        server_name visitors.smartattendance.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name visitors.smartattendance.com;

        ssl_certificate /etc/letsencrypt/live/visitors.smartattendance.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/visitors.smartattendance.com/privkey.pem;
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:'
                   'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:'
                   'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:20m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Host $host;

        location /api/ {
            proxy_pass http://backend_api/;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://frontend_assets/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            try_files $uri /index.html;
        }
    }
}
